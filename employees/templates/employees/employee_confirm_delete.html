{% extends "employees/base.html" %}
{% block page_title %}Delete Employee{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-6 offset-lg-3">
    <div class="card">
      <div class="card-body text-center py-5">
        <div class="mb-3" style="font-size: 3rem;">⚠️</div>
        <h4>Confirm Delete</h4>
        <p class="text-muted mb-4">Are you sure you want to permanently remove <strong>{{ employee.full_name }}</strong> from the employee records? This action cannot be undone.</p>
        <form method="post" class="d-flex justify-content-center gap-2">
          {% csrf_token %}
          <a href="{% url 'employees:employee_list' %}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
